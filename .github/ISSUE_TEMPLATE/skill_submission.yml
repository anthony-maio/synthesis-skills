name: Skill Submission
description: Propose a new curated skill or a substantial update to an existing one.
title: "[skill] "
labels:
  - skill
  - triage
body:
  - type: input
    id: skill_name
    attributes:
      label: Skill name
      description: Lowercase kebab-case directory and front matter name.
      placeholder: csv-parsing-basics
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Intended use
      description: Describe when an agent should load this skill.
    validations:
      required: true
  - type: textarea
    id: provenance
    attributes:
      label: Provenance
      description: Link any upstream repo, docs, or internal source material.
      placeholder: Derived from...
    validations:
      required: true
  - type: dropdown
    id: submission_type
    attributes:
      label: Submission type
      description: How should reviewers think about this skill relative to the current canon?
      options:
        - new_family_candidate
        - canonical_improvement_candidate
        - variant_candidate
        - supersedes_existing
    validations:
      required: true
  - type: input
    id: capability_family
    attributes:
      label: Capability family
      description: The durable family this skill belongs to or proposes.
      placeholder: test-driven-development
    validations:
      required: true
  - type: input
    id: nearest_existing
    attributes:
      label: Nearest existing canonical skill
      description: Name the closest current skill, if any.
      placeholder: systematic-debugging
    validations:
      required: false
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Explain why this is worth curating and what proof supports it.
      placeholder: Real task evidence, eval notes, overlap analysis...
    validations:
      required: true
  - type: textarea
    id: package_shape
    attributes:
      label: Package contents
      description: List the directories or helper files you expect in the skill package.
      placeholder: SKILL.md, scripts/, references/
    validations:
      required: true
