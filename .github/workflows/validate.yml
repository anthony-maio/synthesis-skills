name: Validate Registry

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          npm install -g stss@0.4.3

      - name: STSS gate changed skills
        env:
          STSS_PUBLIC_KEYS_JSON: ${{ secrets.STSS_PUBLIC_KEYS_JSON }}
          STSS_PUBLIC_KEY: ${{ secrets.STSS_PUBLIC_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            python scripts/run_stss_gate.py \
              --base "${{ github.event.pull_request.base.sha }}" \
              --head "${{ github.event.pull_request.head.sha }}"
          else
            python scripts/run_stss_gate.py \
              --base "${{ github.event.before }}" \
              --head "${{ github.sha }}"
          fi

      - name: Lint automation
        run: ruff check scripts tests

      - name: Validate skill packages
        run: python scripts/validate_repo.py

      - name: Verify generated catalog
        run: python scripts/build_catalog.py --check

      - name: Run tests
        run: pytest -q
